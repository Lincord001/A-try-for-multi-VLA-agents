dataset:
  repo_id: omy_arm_data_v4   # <--- 对应 Arm 数据集的 ID (V4版本)
  root: ./demo_data_arm_v4   # <--- 对应 Arm 数据集的本地路径 (V4版本)

policy:
  type: pi0
  chunk_size: 5                # 🔥 V4.1: 从 20 改为 5（减少颤抖）
  n_action_steps: 5            # 🔥 V4.1: 从 20 改为 5（与 chunk_size 一致）
  use_amp: false              # 如果显存够大(A100/4090)，可以设为 true 加速
  attention_implementation: sdpa
  pretrained_path: /path/to/your/paligemma-3b-pt-224  # 指向您上传的本地权重路径

save_checkpoint: true
output_dir: ./ckpt/pi0_arm    # <--- 修改输出目录，避免覆盖
batch_size: 16                # 根据显存调整
job_name: pi0_arm
resume: false
seed: 42
num_workers: 4
steps: 50000                  # 🔥 V4.1: 从 20000 改为 50000（训练更充分，目标 loss < 0.015）

eval_freq: -1
log_freq: 50
save_freq: 10000               
use_policy_training_preset: true

wandb:
  enable: true
  project: omy_robot_project  # 建议统一项目名
  entity: "2466893086-"
  disable_artifact: true