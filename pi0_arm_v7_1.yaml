dataset:
  repo_id: omy_arm_data_v7_1   # <--- 对应 Arm 数据集的 ID (V4版本)
  root: ./demo_data_arm_v7_1   # <--- 对应 Arm 数据集的本地路径 (V4版本)

policy:
  type: pi0
  chunk_size: 64                # 🔥 V4.1: 从 20 改为 5（减少颤抖）
  n_action_steps: 64            # 长序列训练：需与 chunk_size 保持一致，避免注意力 mask 维度不匹配
  use_amp: false              # 如果显存够大(A100/4090)，可以设为 true 加速
  attention_implementation: sdpa
  scheduler_decay_steps: 50000  # 🔥 学习率衰减步数，应与 steps 保持一致
  # pretrained_path 可以不设置，train_model.py 会优先读取 PALIGEMMA_PRETRAINED_PATH，
  # 未设置时使用 Hugging Face 模型 ID: google/paligemma-3b-pt-224
  # pretrained_path: ./PaliGemmaWeights/paligemma-3b-pt-224

save_checkpoint: true
output_dir: ./ckpt/pi0_arm/pretrained_model_arm_v7_1
batch_size: 8                # 根据显存调整
job_name: pi0_arm_v7_1
resume: false
seed: 42
num_workers: 4
steps: 50000                  

eval_freq: -1
log_freq: 50
save_freq: 50000
# 以下字段是作者训练时用于节省空间和挑选 checkpoint 的工程 trick。
# 如果你的 LeRobot 配置解析报 "not valid for TrainPipelineConfig"，直接保持注释即可。
# save_by_freq: true
# save_steps: [38850, 39450, 40100, 43500, 45800, 46150, 48900, 49450, 49900]
# save_by_steps: true
# best_loss_checkpoint_range: [39000, 41000]
# save_best_in_range: false
use_policy_training_preset: true

wandb:
  enable: true
  project: omy_arm_project_v7  # 建议统一项目名
  entity: "Tangyibo"
  disable_artifact: true
